services:
  agent-01:
    image: openclaw-fleet:latest
    build: .
    container_name: openclaw-agent-01
    volumes:
      - ./agents/agent-01:/home/openclaw/.openclaw
    ports:
      - "18701:18701"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openclaw", "gateway", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
